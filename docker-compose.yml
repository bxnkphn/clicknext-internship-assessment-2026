services:
    frontend:
        image: node:20-alpine
        working_dir: /app
        ports:
            - 5173:5173
        volumes:
            - ./frontend:/app
        networks:
            - banking-web-app-network
        command: sh -c "npm install && npm run dev"
    backend:
        image: webdevops/php-nginx:8.2-alpine
        working_dir: /app
        ports:
            - 8000:80
        volumes:
            - ./backend:/app
        environment:
            DB_CONNECTION: mysql
            DB_HOST: database
            DB_PORT: 3306
            DB_DATABASE: banking_db
            DB_USERNAME: root
            DB_PASSWORD: 2545
        networks:
            - banking-web-app-network
        depends_on: 
            - database
    database:
        image: mysql:8.0
        working_dir: /app
        ports:
            - 3307:3306
        volumes:
            - db_data:/var/lib/mysql
        environment:
            MYSQL_DATABASE: banking_db
            MYSQL_ROOT_PASSWORD: 2545
        networks:
            - banking-web-app-network
networks:
    banking-web-app-network:
        driver: bridge
volumes:
    db_data: